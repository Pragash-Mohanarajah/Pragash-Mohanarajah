name: Update Dev Metrics

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      API_SECRET_TOKEN: ${{ secrets.API_SECRET_TOKEN }}
      STATS_URL: ${{ vars.STATS_URL }}
      SECTION_NAME: DEV_METRICS
      COMMIT_MESSAGE: Updated with Dev Metrics
      SYMBOL_VERSION: 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Dev Metrics
        run: node scripts/generate-dev-metrics.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md commit-history.svg contribution-graph.svg
          git commit -m "$COMMIT_MESSAGE" || echo "No changes"
          git push
